name: Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  php-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '7.4'
          - '8.1'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Validate Composer files
        run: composer validate --no-check-lock

      - name: Install Composer dependencies
        run: composer update --no-interaction --prefer-dist --no-audit

      - name: Run PHPUnit
        run: composer test

      - name: Run PHPCS
        run: composer lint

  e2e-tests:
    runs-on: ubuntu-latest
    # E2E tests require Docker (for wp-env) and are the critical gate for
    # frontend render correctness. PHPUnit cannot catch render_icon failures
    # because they return empty string silently — only a real browser + WP
    # can verify that icons actually appear on published pages.
    needs: php-tests
    env:
      WP_ENV_HOME: /tmp/wp-env
      SPECTRE_E2E_BASE_URL: http://localhost:8888
      SPECTRE_E2E_ADMIN_USER: admin
      SPECTRE_E2E_ADMIN_PASSWORD: password

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Verify Docker is available
        run: |
          docker version
          docker compose version

      - name: Start wp-env
        run: npx wp-env start

      - name: Wait for WordPress
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..60}; do
            if curl --fail --silent --show-error "$SPECTRE_E2E_BASE_URL/wp-login.php" >/dev/null; then
              echo "WordPress is responding."
              exit 0
            fi

            echo "Waiting for WordPress... attempt ${attempt}/60"
            sleep 2
          done

          echo "WordPress did not become ready in time."
          npx wp-env logs --no-watch
          exit 1

      - name: Install Elementor
        run: npx wp-env run cli -- wp plugin install elementor --version=3.29.2 --force --activate --skip-plugins --skip-themes

      - name: Activate Spectre Icons plugin
        run: npx wp-env run cli -- wp plugin activate spectre-icons --skip-plugins --skip-themes

      - name: Verify plugin states
        run: |
          npx wp-env run cli -- wp core version --skip-plugins --skip-themes
          npx wp-env run cli -- wp plugin list --format=table --skip-plugins --skip-themes

      - name: Run smoke tests
        run: npm run test:e2e:smoke

      - name: Run Elementor icon flow tests
        run: npm run test:e2e:elementor

      - name: Run My Icons frontend render tests
        run: npm run test:e2e:my-icons

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-failures
          path: test-results/
          retention-days: 7

      - name: Print wp-env logs on failure
        if: failure()
        run: npx wp-env logs --no-watch

      - name: Stop wp-env
        if: always()
        run: npx wp-env stop
